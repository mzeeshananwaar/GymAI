<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit User | GymAI Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #3b82f6;
      --success: #22c55e;
      --dark-bg: #0f172a;
      --card-bg: #1e293b;
      --text-gray: #94a3b8;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--dark-bg);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .edit-container {
      background: var(--card-bg);
      width: 100%;
      max-width: 450px;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      border: 1px solid #334155;
    }

    h2 {
      margin-top: 0;
      font-weight: 800;
      border-left: 5px solid var(--primary);
      padding-left: 15px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9em;
      color: var(--text-gray);
    }

    input, select {
      width: 100%;
      padding: 12px 15px;
      background: #0f172a;
      border: 1px solid #334155;
      color: white;
      border-radius: 8px;
      box-sizing: border-box;
      outline: none;
      transition: 0.3s;
    }

    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 8px rgba(59, 130, 246, 0.3);
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }

    button {
      flex: 2;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-cancel {
      flex: 1;
      background: transparent;
      border: 1px solid #ef4444;
      color: #ef4444;
      text-decoration: none;
      text-align: center;
      line-height: 40px; /* Center text */
      border-radius: 8px;
      font-size: 0.9em;
    }

    button:hover { filter: brightness(1.2); }
    .btn-cancel:hover { background: #ef4444; color: white; }

    .loading-text { color: var(--primary); text-align: center; display: block; }
  </style>
</head>
<body>

<div class="edit-container">
  <h2><i class="fas fa-user-edit"></i> Edit User Profile</h2>
  
  <div id="loader" class="loading-text">Fetching user data...</div>

  <form id="editForm" method="POST" style="display:none;">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="name" id="name" required>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" id="email" required>
    </div>

    <div class="form-group">
      <label>Contact Number</label>
      <input type="text" name="phone" id="phone" placeholder="+92 3xx xxxxxxx">
    </div>

    <div class="form-group">
      <label>System Role</label>
      <select name="role" id="role">
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>
    </div>

    <div class="btn-group">
      <a href="/admin.html" class="btn-cancel">Cancel</a>
      <button type="submit">Update Details</button>
    </div>
  </form>
</div>

<script>
  // 1. URL se ID nikalna
  const urlParams = new URLSearchParams(window.location.search);
  const id = urlParams.get('id');
  
  const editForm = document.getElementById('editForm');
  const loader = document.getElementById('loader');

  // Agar ID na mile toh error dikhayein
  if (!id) {
    loader.innerText = "Error: No user ID provided in URL.";
  } else {
    // 2. Server se data mangwana
    fetch('/user/' + id)
      .then(res => {
        if (!res.ok) throw new Error("User not found or Server error");
        return res.json();
      })
      .then(data => {
        // Form fields bharna
        document.getElementById('name').value = data.name || "";
        document.getElementById('email').value = data.email || "";
        document.getElementById('phone').value = data.phone || ""; 
        document.getElementById('role').value = data.role || "user";

        // Form ka action URL set karna
        editForm.action = '/update/' + id;
        
        // Loader chhupana aur form dikhana
        loader.style.display = 'none';
        editForm.style.display = 'block';
      })
      .catch(err => {
        loader.innerText = "Error: Could not load user data.";
        loader.style.color = "#ef4444";
        console.error("Fetch error:", err);
      });
  }
</script>

</body>
</html>
