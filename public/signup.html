<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup | GymAI Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      background: rgba(255, 255, 255, 0.03);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(15px);
      text-align: center;
      width: 360px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    input {
      width: 100%;
      padding: 12px 15px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.2);
      color: white;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #22c55e;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 15px;
      color: #000;
    }
    .fixed-back-btn {
      position: fixed;
      top: 25px;
      left: 25px;
      background: #22c55e;
      color: #000;
      padding: 10px 20px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <a href="index.html" class="fixed-back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>

  <div class="box">
    <h2>Gym<span>AI</span></h2>
    <p>Create your account</p>
    <!-- Zaroori: action aur method yahan se hata diye hain -->
    <form id="signupForm">
      <input type="text" name="name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email Address" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Sign Up</button>
    </form>
    <div style="margin-top: 20px; font-size: 14px; color: #94a3b8;">
        Already have an account? 
        <a href="login.html" style="color: #22c55e; text-decoration: none; font-weight: 600; margin-left: 5px;">Login Here</a>
    </div>
  </div>

                  
  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault(); // Page refresh ko rokne ke liye
      
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());

      try {
        const response = await fetch('/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const resultText = await response.text();

        if (response.status === 200 || response.status === 201) {
          // Alert hata diya hai, ab seedha redirect hoga
          window.location.href = '/onboarding.html'; 
        } else if (response.status === 400) {
          // Error alert abhi bhi zaroori hai taake user ko duplicate email ka pata chale
          alert(resultText); 
        } else {
          alert("Error: " + resultText);
        }
      } catch (err) {
        console.error(err);
        alert("Connection Error!");
      }
    });
</script>
</body>
</html>
