<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymAI | Admin Core</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary: #3b82f6; /* Admin Blue Theme */
      --success: #22c55e;
      --danger: #ef4444;
      --dark-bg: #0f172a;
      --card-bg: #1e293b;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--dark-bg);
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 { text-align: left; margin-bottom: 30px; font-weight: 800; border-left: 5px solid var(--primary); padding-left: 15px; }

    /* STATS SECTION */
    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #334155;
      text-align: center;
    }

    .stat-card i { font-size: 24px; color: var(--primary); margin-bottom: 10px; }

    /* CONTROLS */
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card-bg);
      padding: 15px 25px;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    input#search {
      padding: 12px 20px;
      width: 300px;
      background: #0f172a;
      border: 1px solid #334155;
      color: white;
      border-radius: 50px;
      outline: none;
    }

    button {
      padding: 10px 20px;
      background: var(--primary);
      border: none;
      color: white;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover { filter: brightness(1.2); }

    .btn-export { background: transparent; border: 1px solid var(--primary); color: var(--primary); text-decoration: none; padding: 10px 20px; border-radius: 8px; }
    .btn-export:hover { background: var(--primary); color: white; }

    /* TABLE STYLING */
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    th { background: #334155; padding: 18px; text-align: left; color: var(--primary); text-transform: uppercase; font-size: 13px; }
    td { padding: 15px; border-bottom: 1px solid #334155; font-size: 14px; }
    
    tr:hover { background: rgba(255,255,255,0.03); }

    .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
    .badge-admin { background: rgba(59, 130, 246, 0.2); color: #3b82f6; border: 1px solid #3b82f6; }
    .badge-user { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid #22c55e; }

    .actions a { color: white; text-decoration: none; margin-right: 10px; font-size: 18px; transition: 0.2s; }
    .actions .edit:hover { color: var(--success); }
    .actions .delete:hover { color: var(--danger); }
  </style>
</head>
<body>

  <h1>🛡️ Admin Core System</h1>

  <!-- Top Stats -->
  <div class="admin-stats">
    <div class="stat-card"><i class="fas fa-users"></i><h2 id="userCount">0</h2><p>Total Registered</p></div>
    <div class="stat-card"><i class="fas fa-user-shield"></i><h2 id="adminCount">0</h2><p>Admins</p></div>
    <div class="stat-card"><i class="fas fa-database"></i><h2>Active</h2><p>System Status</p></div>
  </div>

  <!-- Search & Actions -->
  <div class="controls">
    <input type="text" id="search" placeholder="🔍 Search name or email..." onkeyup="searchUser()">
    <div>
      <button onclick="loadUsers()"><i class="fas fa-sync"></i> Refresh List</button>
      <a href="/export-users" class="btn-export"><i class="fas fa-file-csv"></i> Export CSV</a>
    </div>
  </div>

  <!-- Table -->
  <table id="userTable">
    <thead>
      <tr>
        <th>User ID</th>
        <th>Full Name</th>
        <th>Email Address</th>
        <th>Status / Role</th>
        <th>Management Actions</th>
      </tr>
    </thead>
    <tbody id="userTableBody">
      <!-- Data will be injected here -->
    </tbody>
  </table>

  <script>
    // 1. Load Users with Extended Data (Role Logic Added)
    function loadUsers() {
      fetch('/users')
        .then(res => res.json())
        .then(data => {
          let tableBody = document.getElementById("userTableBody");
          tableBody.innerHTML = ""; // Clear current table

          let adminCount = 0;
          document.getElementById("userCount").innerText = data.length;

          data.forEach(user => {
            if(user.role === 'admin') adminCount++;
            
            let roleBadge = user.role === 'admin' 
              ? `<span class="badge badge-admin">ADMIN</span>` 
              : `<span class="badge badge-user">USER</span>`;

            let row = `
              <tr>
                <td>#${user.id}</td>
                <td style="font-weight:bold;">${user.name}</td>
                <td style="color:#94a3b8;">${user.email}</td>
                <td>${roleBadge}</td>
                <td class="actions">
                  <a href="/edit.html?id=${user.id}" class="edit" title="Edit User"><i class="fas fa-edit"></i></a>
                  <a href="/delete/${user.id}" class="delete" title="Delete User" onclick="return confirm('Attention: Are you sure you want to delete this user?')"><i class="fas fa-trash-alt"></i></a>
                </td>
              </tr>
            `;
            tableBody.innerHTML += row;
          });

          document.getElementById("adminCount").innerText = adminCount;
        })
        .catch(err => {
          console.error(err);
          alert("Unable to fetch user data. Please check server connection. ⚠️");
        });
    }

    // 2. Optimized Search Logic
    function searchUser() {
      let input = document.getElementById("search").value.toLowerCase();
      let rows = document.querySelectorAll("#userTableBody tr");

      rows.forEach(row => {
        let name = row.cells[1].innerText.toLowerCase();
        let email = row.cells[2].innerText.toLowerCase();

        if (name.includes(input) || email.includes(input)) {
          row.style.display = "";
        } else {
          row.style.display = "none";
        }
      });
    }

    // Auto-load on startup
    window.onload = loadUsers;
  </script>

</body>
</html>
